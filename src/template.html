<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Penta P Group</title>
</head>

<body>
    <nav></nav>
    <main id="home">
        <section class="hero-section">
            <div class="hero-copy">
                <h1 data-i18n="hero.title"></h1>
                <p data-i18n="hero.subtitle"></p>
                <div class="hero-actions">
                    <a class="btn btn-primary" href="#group-section" data-i18n="hero.ctaAccommodation"></a>
                    <a class="btn btn-outline" href="#warehouse-card" data-i18n="hero.ctaWarehouse"></a>
                    <a class="btn btn-secondary" href="contact.html" data-i18n="hero.ctaSecondary"></a>
                </div>
            </div>
        </section>

        <section class="group-section" id="group-section">
            <div class="section-heading">
                <h2 data-i18n="group.accom.title"></h2>
                <p data-i18n="group.accom.subtitle"></p>
            </div>

            <div class="group-grid group-grid-primary">
                <a href="accommodation.html#pph" class="group-card-link">
                    <article class="group-card">
                        <img src="./assets/pph.webp" alt="Penta P Hospitality">
                        <div class="group-card-content">
                            <h3 data-i18n="group.pph.title"></h3>
                            <p data-i18n="group.pph.description"></p>
                        </div>
                    </article>
                </a>

                <a href="accommodation.html#ppr" class="group-card-link">
                    <article class="group-card">
                        <img src="./assets/ppr_clean.webp" alt="Penta P Residence">
                        <div class="group-card-content">
                            <h3 data-i18n="group.ppr.title"></h3>
                            <p data-i18n="group.ppr.description"></p>
                        </div>
                    </article>
                </a>

                <a href="accommodation.html#ppa" class="group-card-link group-card-full">
                    <article class="group-card">
                        <img src="./assets/ppa.webp" alt="Penta P Apartment">
                        <div class="group-card-content">
                            <h3 data-i18n="group.ppa.title"></h3>
                            <p data-i18n="group.ppa.description"></p>
                        </div>
                    </article>
                </a>
            </div>

            <div class="section-heading">
                <h2 data-i18n="group.warehouse.title"></h2>
                <p data-i18n="group.warehouse.subtitle"></p>
            </div>
            <div class="group-grid group-grid-secondary">
                <a href="warehouse.html#warehouse-1" class="group-card-link">
                    <article class="group-card group-card-accent" id="warehouse-card">
                        <img src="./assets/ppw.webp" alt="Penta P Warehouse">
                        <div class="group-card-content">
                            <h3 data-i18n="group.ppw.title"></h3>
                            <p data-i18n="group.ppw.description"></p>
                        </div>
                    </article>
                </a>

                <a href="warehouse.html#warehouse-2" class="group-card-link">
                    <article class="group-card group-card-accent" id="warehouse-card-2">
                        <img src="./assets/ppw2.webp" alt="Penta P Warehouse 2">
                        <div class="group-card-content">
                            <h3 data-i18n="group.ppw2.title"></h3>
                            <p data-i18n="group.ppw2.description"></p>
                        </div>
                    </article>
                </a>
            </div>
        </section>

        <section class="contact-section" id="contact-section">
            <div>
                <h2 data-i18n="contact.title"></h2>
            </div>
            <a class="btn btn-primary" href="contact.html" data-i18n="contact.cta"></a>
        </section>
    </main>
</body>

</html>
